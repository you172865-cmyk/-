<style id="base-css">
    :root { --global-font-size: 15px; }
    
    * { 
        box-sizing: border-box; margin: 0; padding: 0; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        -webkit-tap-highlight-color: transparent; 
    }
    
    body { background-color: #000; overflow: hidden; margin: 0; padding: 0; width: 100vw; height: 100vh; }
    
    #phone-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: url('https://img.heliar.top/file/1773998063711_IMG_5804.png') no-repeat center center/cover; overflow: hidden; display: flex; flex-direction: column; font-size: var(--global-font-size); transform: translate3d(0,0,0); will-change: background-image; }
    
    #desktop-icons { 
        flex: 1; 
        padding: 20px 15px; 
        padding-top: calc(max(60px, env(safe-area-inset-top, 40px) + 20px)); 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        grid-auto-rows: min-content; 
        row-gap: 25px; 
        column-gap: 12px;
        justify-items: center; 
        align-items: start; 
        overflow-y: auto;
    }

    #clock-widget {
        grid-column: span 2;
        grid-row: span 2;
        width: 100%;
        aspect-ratio: 1 / 1; 
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
        border-radius: 30px; 
        box-shadow: inset 0 4px 15px rgba(255,255,255,0.7), inset 0 -2px 10px rgba(0,0,0,0.03), 0 8px 25px rgba(0,0,0,0.08);
        border: 1.5px solid rgba(255,255,255,0.6);
        display: flex; justify-content: center; align-items: center; position: relative;
    }
    
    .clock-inner-ring {
        position: absolute;
        inset: 12px;
        border-radius: 20px;
        border: 3.5px dashed #000;
        opacity: 0.25; 
        pointer-events: none;
    }

    #clock-time {
        font-size: 3.6em;
        font-weight: 300; 
        color: #000;
        letter-spacing: -2px;
        z-index: 2;
        text-shadow: 0 2px 15px rgba(255,255,255,0.9);
        display: inline-block;
        transform: scaleY(1.3);
        transform-origin: center;
    }
    
    .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; width: 100%; }
    
    .app-icon {

        backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); 
        border-radius: 16px; 
        display: flex; justify-content: center; align-items: center; 
        box-shadow: inset 0 4px 15px rgba(255,255,255,0.7), inset 0 -2px 10px rgba(0,0,0,0.03), 0 8px 20px rgba(0,0,0,0.08); 
        border: 1.5px solid rgba(255,255,255,0.6);
        background-size: cover; background-position: center; 
    }
    
    .app-name { 
        color: #000; 
        font-size: 12px; 
        font-weight: 600; 
        text-shadow: none; 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        max-width: 90%;

        align-items: flex-end;
